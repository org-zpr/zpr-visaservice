[package]
name = "vs"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.6"
clap = { version = "4.5.50", features = ["derive"] }
futures-util = "0.3.31"
hyper = "1.7.0"
hyper-util = "0.1.17"
libeval = { path = "../libeval" }
openssl = "0.10.74"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["full"] }
tokio-native-tls = "0.3.1"
toml = "0.9.8"
tower-service = "0.3.3"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
zpr-policy = { git = "https://github.com/org-zpr/zpr-policy-rs.git", tag = "v0.8.2", features = ["v2"] }

