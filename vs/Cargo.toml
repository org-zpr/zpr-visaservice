[package]
name = "vs"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.6"
capnp-rpc = "0.23.0"
clap = { version = "4.5.50", features = ["derive"] }
futures-util = "0.3.31"
hyper = "1.7.0"
hyper-util = "0.1.17"
libeval = { path = "../libeval" }
openssl = "0.10.74"
redis = { version = "0.32.7", features = ["tokio-comp", "aio", "connection-manager", "safe_iterators"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["full"] }
tokio-native-tls = "0.3.1"
toml = "0.9.8"
tower-service = "0.3.3"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
zpr = { git = "https://github.com/org-zpr/zpr-common.git", tag = "v0.2.0", features = ["vsapi"]}
admin-api-types = { path = "../admin-api-types" }
tokio-util = { version = "0.7.16", features = ["compat"] }
capnp = { version = "0.23.0", features = ["sync_reader"] }
arc-swap = "1.7.1"
bytes = "1.10.1"
ipnet = "2.11.0"
tokio-stream = "0.1.17"
futures = "0.3.31"
dashmap = "6.1.0"
hex = "0.4.3"
chrono = "0.4.42"
percent-encoding = "2.3.2"
http = "1.4.0"
http-body-util = "0.1.3"

