# VS example configuration file.
#
# All fields have sensible defaults and are shown below commented out.
# Uncomment and modify as needed. Copy this file and use -c/--config to
# point vs at your copy.

[core]
# The visa service bind address. This is baked into the ZPR system;
# only override for testing.
# vs_addr = "fd5a:5052::1"

# VSAPI port used by nodes to talk to the visa service.
# vsapi_port = 5002

# HTTPS admin API port.
# admin_port = 8182

# TLS certificate and key for the admin HTTPS service.
# admin_cert = "admin-tls-cert.pem"
# admin_key = "admin-tls-key.pem"

# ValKey/Redis connection URI.
# vk_uri = "redis://127.0.0.1:6379"
