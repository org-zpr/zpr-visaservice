[package]
name = "libeval"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Packet/Actor evaluator library; a component of the ZPR visa service"

[dependencies]
bytes = "1.10.1"
capnp = { version = "0.23.0", features = ["sync_reader"] }
openssl = "0.10.74"
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.16"
tracing = "0.1.41"
zpr-policy = { git = "https://github.com/org-zpr/zpr-policy-rs.git", tag = "v0.9.1", features = ["v2"] }

[dev-dependencies]
tracing-subscriber = "0.3.20"
