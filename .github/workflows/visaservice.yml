# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go-visaservice

on:
  push:
    branches: [ "main" ]
    paths:
      - 'mods/**'
      - 'core/**'
      - '.github/workflows/visaservice.yml'
  pull_request:
    paths:
      - 'mods/**'
      - 'core/**'
      - '.github/workflows/visaservice.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Build & test Visa Service (Go)
    defaults:
      run:
        working-directory: .
    runs-on: ubuntu-latest
    container:
      image: docker://ghcr.io/org-zpr/38f3bb925e5e:latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

    # see <https://github.com/docker-library/golang/issues/452>
    - name: Set workspace as safe
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Setup Git credentials
      timeout-minutes: 1
      run: |
        echo 'echo $ZPR_CICD_RO_TOKEN' > "$HOME/.git-askpass"
        chmod +x "$HOME/.git-askpass"
        echo "GIT_ASKPASS=$HOME/.git-askpass" >> "$GITHUB_ENV"
        go env -w GOPRIVATE="github.com/org-zpr/*"

    - name: Build
      timeout-minutes: 5
      env:
        ZPR_CICD_RO_TOKEN: ${{ secrets.ZPR_CICD_RO_TOKEN }}
      run: make all-go

    - name: Test
      timeout-minutes: 5
      env:
        ZPR_CICD_RO_TOKEN: ${{ secrets.ZPR_CICD_RO_TOKEN }}
      run: make test-go

    - name: Conform
      working-directory: ./
      timeout-minutes: 5
      run: ZPR_TEST_VERBOSE=1 integration-test/vs-conform-test.sh
